<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tasks | Go Notes Service</title>
    <link rel="stylesheet" href="./styles.css" />
</head>
<body>
    <div class="container">
        <header class="topbar">
            <h1>Tasks</h1>
            <nav class="nav-links">
                <a href="./index.html">Home</a>
                <a href="./notes.html">Notes</a>
            </nav>
        </header>

        <section class="card">
            <h2>Create Task</h2>
            <div class="row">
                <input type="text" id="new-task-title" placeholder="Task title" />
                <textarea id="new-task-description" placeholder="Task description"></textarea>
                <button id="add-task-btn" type="button">Add Task</button>
            </div>
        </section>

        <section class="card list-card">
            <h2>All Tasks</h2>
            <ul id="tasks-list" class="item-list"></ul>
        </section>
    </div>

    <script src="./app.js"></script>
</body>
</html>
